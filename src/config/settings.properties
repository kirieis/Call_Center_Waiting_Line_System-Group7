# ============================================================
# Call Center Waiting Line System - Configuration
# ============================================================
# File: settings.properties
# Description: Cau hinh he thong quan ly cuoc goi cho
# ============================================================

# --- Queue Settings ---
# Kich thuoc toi da cua Circular Queue (hang doi vong)
circular.queue.capacity=100

# --- Priority Settings ---
# Diem uu tien cho khach hang VIP
priority.vip.bonus=50

# Diem uu tien cho moi lan goi lai (repeat call)
priority.repeat.multiplier=10

# --- Aging Algorithm Settings ---
# Nguong thoi gian (ms) truoc khi tang diem uu tien
aging.threshold.ms=30000

# Diem tang them moi lan aging
aging.boost=5

# --- Data Generator Settings ---
# So luong cuoc goi ngau nhien can sinh
generator.default.count=10000

# Ti le khach hang VIP (%)
generator.vip.percentage=15

# So lan goi lai toi da
generator.max.repeat.calls=10

# --- File Paths ---
# Duong dan file du lieu cuoc goi tho (sinh ngau nhien)
data.raw.calls.path=data/CustomerCalls.csv

# Duong dan file lich su cuoc goi da xu ly
data.call.history.path=data/call_history.csv

# --- Console Display Settings ---
# So dong hien thi moi trang (phan trang)
console.page.size=20

# Do rong cot trong bang (ky tu)
console.column.width=15

# --- System Settings ---
# Che do debug (true/false)
system.debug=false

# Ngon ngu hien thi (vi/en)
system.language=vi
